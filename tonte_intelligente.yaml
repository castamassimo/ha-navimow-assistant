# ╔══════════════════════════════════════════════════════════════╗
# ║        🌿 ASSISTANT INTELLIGENT DE TONTE v2.3 🌿           ║
# ║       Package Home Assistant - Navimow + NavimowHA          ║
# ╚══════════════════════════════════════════════════════════════╝
#
#  ┌──────────────────────────────────────────────────────────┐
#  │         ⚙️  CONFIGURATION — DEUX MÉTHODES               │
#  │                                                          │
#  │  MÉTHODE 1 (recommandée) : Carte d'installation          │
#  │  Chargez tonte_setup.yaml, ajoutez la carte              │
#  │  carte_tonte_installation.yaml dans votre dashboard,     │
#  │  remplissez le formulaire et cliquez "Appliquer".        │
#  │  Vos paramètres sont sauvegardés dans tonte_setup.yaml   │
#  │  et survivent aux mises à jour du fichier principal.     │
#  │                                                          │
#  │  MÉTHODE 2 (manuelle) : Chercher/Remplacer               │
#  │  1. navimow_VOTRE_MODELE  →  votre modèle               │
#  │     (ex: navimow_i105e, navimow_h3000, navimow_x3...)   │
#  │  2. breteuil  →  votre ville Météo France                │
#  │  3. ha_maison_update_event  →  votre entité Telegram     │
#  │     Si mobile : remplacer aussi mobile_app_pixel_9a      │
#  │  4. NOTIFICATIONS : modifier "initial:" ci-dessous       │
#  │  5. ZONE ISOLÉE : déclarée dans tonte_setup.yaml         │
#  │  6. CALENDRIER : voir section ci-dessous                 │
#  │  7. SAISONS : configurable depuis le dashboard           │
#  │  8. TIMERS AVANCÉS : voir section ci-dessous             │
#  └──────────────────────────────────────────────────────────┘


# ============================================================
#  1. INPUT HELPERS
# ============================================================

# tonte_mode_notification est déclaré dans tonte_setup.yaml

# ┌──────────────────────────────────────────────────────────┐
# │         🏠 ZONE ISOLÉE (terrasse, potager, etc.)         │
# │                                                          │
# │  Pour DÉSACTIVER : mettre initial: false ci-dessous      │
# │  Pour RENOMMER  : changer "Terrasse" ci-dessous          │
# └──────────────────────────────────────────────────────────┘

# tonte_zone_isolee_nom est déclaré dans tonte_setup.yaml

input_datetime:
  tonte_derniere_date:
    name: "Dernière tonte effectuée"
    has_date: true
    has_time: false
    icon: mdi:calendar-check
  tonte_heure_notification:
    name: "Heure de notification"
    has_date: false
    has_time: true
    icon: mdi:clock-outline
    initial: "08:00"

  # Plage horaire autorisée pour le démarrage automatique
  tonte_auto_heure_debut:
    name: "Mode auto - Heure de début"
    has_date: false
    has_time: true
    icon: mdi:clock-start
    initial: "09:00"

  tonte_auto_heure_fin:
    name: "Mode auto - Heure de fin"
    has_date: false
    has_time: true
    icon: mdi:clock-end
    initial: "18:00"

input_boolean:
  tonte_hivernage_force:
    name: "Hivernage forcé"
    icon: mdi:snowflake
  tonte_mode_vacances:
    name: "Mode vacances"
    icon: mdi:palm-tree
  tonte_afficher_reglages:
    name: "Afficher les réglages"
    icon: mdi:cog
    initial: false
  tonte_afficher_config_saison:
    name: "Afficher config saisonnière"
    icon: mdi:calendar-month
    initial: false
  tonte_session_active:
    name: "Session de tonte en cours"
    icon: mdi:robot-mower
  tonte_mode_zone_isolee:
    name: "Tonte zone isolée en cours"
    icon: mdi:floor-plan
  tonte_zone_isolee_active:
    name: "Zone isolée activée"
    icon: mdi:floor-plan
    # ═══ MODIFIER ICI : true pour activer, false pour désactiver ═══
    initial: true
  tonte_zone_confirmee:
    name: "Zone confirmée pour cette session"
    icon: mdi:check
  tonte_session_ignoree:
    name: "Session ignorée (ne pas compter)"
    icon: mdi:cancel
  tonte_reportee_aujourdhui:
    name: "Tonte reportée aujourd'hui"
    icon: mdi:calendar-arrow-right

  # ┌──────────────────────────────────────────────────────────┐
  # │         📅 CALENDRIER calendar.tondeuse                  │
  # │                                                          │
  # │  Pour DÉSACTIVER : mettre initial: false ci-dessous      │
  # │  (aucun événement ne sera créé dans le calendrier)       │
  # └──────────────────────────────────────────────────────────┘
  tonte_calendrier_actif:
    name: "Calendrier tondeuse activé"
    icon: mdi:calendar-check
    # ═══ MODIFIER ICI : true pour activer, false pour désactiver ═══
    initial: true

  # tonte_mode_auto est déclaré dans tonte_setup.yaml
  # (persistance garantie entre les redémarrages HA)

  # Watchdog démarrage auto : true pendant l'attente de confirmation
  # que la tondeuse est bien passée en mowing après ordre de démarrage
  tonte_auto_watchdog_actif:
    name: "Watchdog démarrage auto actif"
    icon: mdi:timer-alert
    initial: false

input_select:
  tonte_auto_jour_exclusion:
    name: "Mode auto - Jour exclu"
    icon: mdi:calendar-remove
    options:
      - aucun
      - lundi
      - mardi
      - mercredi
      - jeudi
      - vendredi
      - samedi
      - dimanche
    initial: dimanche

input_number:
  tonte_hauteur_override:
    name: "Override hauteur"
    min: 0
    max: 8
    step: 0.5
    unit_of_measurement: "cm"
    icon: mdi:ruler
  tonte_seuil_pluie:
    name: "Seuil pluie pour report"
    min: 20
    max: 80
    step: 5
    initial: 50
    unit_of_measurement: "%"
    icon: mdi:weather-rainy

  # ┌──────────────────────────────────────────────────────────┐
  # │  PRISE CONNECTÉE — seuils de détection (optionnel)       │
  # │  Actif uniquement si tonte_cfg_prise_station est renseigné│
  # └──────────────────────────────────────────────────────────┘
  tonte_prise_seuil_charge:
    name: "Prise - Seuil charge active (W)"
    min: 20
    max: 200
    step: 5
    initial: 50
    unit_of_measurement: "W"
    icon: mdi:lightning-bolt

  tonte_prise_seuil_veille_min:
    name: "Prise - Seuil veille min (W)"
    min: 1
    max: 20
    step: 0.5
    initial: 6
    unit_of_measurement: "W"
    icon: mdi:power-sleep

  tonte_prise_seuil_veille_max:
    name: "Prise - Seuil veille max (W)"
    min: 5
    max: 30
    step: 0.5
    initial: 10
    unit_of_measurement: "W"
    icon: mdi:power-sleep

  tonte_prise_delai_confirmation:
    name: "Prise - Délai confirmation veille (min)"
    min: 5
    max: 30
    step: 1
    initial: 10
    unit_of_measurement: "min"
    icon: mdi:timer-check
  tonte_seuil_batterie:
    name: "Seuil alerte batterie"
    min: 5
    max: 30
    step: 5
    initial: 10
    unit_of_measurement: "%"
    icon: mdi:battery-alert

  # ┌──────────────────────────────────────────────────────────┐
  # │         ⏱️  TIMERS AVANCÉS (configurable en YAML)        │
  # │                                                          │
  # │  Ces valeurs sont les durées par défaut des timers.      │
  # │  Modifiez les "initial:" selon vos besoins.              │
  # └──────────────────────────────────────────────────────────┘

  # Délai avant de considérer la tonte comme terminée
  # après le retour à la base (en minutes). Défaut : 90 min.
  tonte_delai_fin_detection:
    name: "Délai fin de tonte (min)"
    min: 15
    max: 240
    step: 15
    # ═══ MODIFIER ICI : durée en minutes (défaut 60)
    # 60 min = calé sur les cycles de recharge terrain (~44-46 min)
    # Ignoré si mode prise connectée activé ═══
    initial: 60
    unit_of_measurement: "min"
    icon: mdi:timer-sand

  # Raccourci batterie pleine : si la batterie atteint le seuil
  # ci-dessous pendant la pause, le timer est réduit à cette durée.
  tonte_seuil_batterie_raccourci:
    name: "Seuil batterie raccourci timer (%)"
    min: 80
    max: 100
    step: 5
    # ═══ MODIFIER ICI : seuil % pour raccourci (défaut 100) ═══
    initial: 100
    unit_of_measurement: "%"
    icon: mdi:battery-check

  # Durée du raccourci quand la batterie atteint le seuil (en minutes)
  tonte_delai_raccourci_batterie:
    name: "Durée raccourci batterie (min)"
    min: 5
    max: 60
    step: 5
    # ═══ MODIFIER ICI : durée raccourci en minutes (défaut 15) ═══
    initial: 15
    unit_of_measurement: "min"
    icon: mdi:timer-check

  # Délai avant de demander la zone (en secondes). Défaut : 120s = 2 min.
  tonte_delai_demande_zone:
    name: "Délai demande zone (sec)"
    min: 30
    max: 600
    step: 30
    # ═══ MODIFIER ICI : durée en secondes (défaut 120 = 2 min) ═══
    initial: 120
    unit_of_measurement: "sec"
    icon: mdi:timer-outline

  # Nombre de jours de retard (× intervalle) avant alerte "pelouse en retard"
  # Défaut : 2 × l'intervalle du mois. Ex : intervalle 3j → alerte à 6j
  tonte_retard_multiplicateur:
    name: "Retard avant alerte (× intervalle)"
    min: 1
    max: 5
    step: 0.5
    # ═══ MODIFIER ICI : multiplicateur (défaut 2) ═══
    initial: 2
    unit_of_measurement: "×"
    icon: mdi:alert-circle-outline

  # ═══════════════════════════════════════════════════════
  #  PROFILS SAISONNIERS — intervalle (jours entre tontes)
  #  0 = hivernage (pas de tonte ce mois-ci)
  # ═══════════════════════════════════════════════════════
