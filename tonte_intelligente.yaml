# ============================================================
#  2. TEMPLATE SENSORS
# ============================================================

template:
  - sensor:
      - name: "Tonte - Profil saisonnier"
        unique_id: tonte_profil_saisonnier
        icon: >
          {% set m = now().month %}
          {% if m in [11,12,1,2] %}mdi:snowflake{% elif m in [3,4,5] %}mdi:flower{% elif m in [6,7,8] %}mdi:white-balance-sunny{% else %}mdi:leaf{% endif %}
        state: >
          {% set m = now().month %}
          {% set k = '{:02d}'.format(m) %}
          {% set iv = states('input_number.tonte_intervalle_' ~ k) | int(5) %}
          {% if iv == 0 %}hivernage
          {% else %}
            {% set noms = {1:'janvier',2:'février',3:'mars',4:'avril',5:'mai',6:'juin',7:'juillet',8:'août',9:'septembre',10:'octobre',11:'novembre',12:'décembre'} %}
            {{ noms[m] }}
          {% endif %}
        attributes:
          frequence_par_semaine: >
            {% set m = now().month %}
            {% set k = '{:02d}'.format(m) %}
            {% set iv = states('input_number.tonte_intervalle_' ~ k) | int(0) %}
            {% if iv == 0 %}0
            {% elif iv <= 1 %}7
            {% elif iv == 2 %}3 à 4
            {% elif iv == 3 %}2 à 3
            {% elif iv <= 5 %}1 à 2
            {% else %}1
            {% endif %}
          hauteur_coupe_cm: >
            {% set m = now().month %}
            {% set k = '{:02d}'.format(m) %}
            {{ states('input_number.tonte_hauteur_' ~ k) | float(4) }}
          intervalle_jours: >
            {% set m = now().month %}
            {% set k = '{:02d}'.format(m) %}
            {{ states('input_number.tonte_intervalle_' ~ k) | int(5) }}
          est_hivernage: >
            {% set m = now().month %}
            {% set k = '{:02d}'.format(m) %}
            {{ states('input_number.tonte_intervalle_' ~ k) | int(5) == 0 }}
          description_mois: >
            {% set m = now().month %}
            {% set k = '{:02d}'.format(m) %}
            {% set iv = states('input_number.tonte_intervalle_' ~ k) | int(0) %}
            {% set h = states('input_number.tonte_hauteur_' ~ k) | float(0) %}
            {% set noms = {1:'Janvier',2:'Février',3:'Mars',4:'Avril',5:'Mai',6:'Juin',7:'Juillet',8:'Août',9:'Septembre',10:'Octobre',11:'Novembre',12:'Décembre'} %}
            {% if iv == 0 %}Hivernage - Repos hivernal
            {% else %}
              {% if iv <= 1 %}{{ noms[m] }} - 7 tontes/sem{% elif iv == 2 %}{{ noms[m] }} - 3 à 4 tontes/sem{% elif iv == 3 %}{{ noms[m] }} - 2 à 3 tontes/sem{% elif iv <= 5 %}{{ noms[m] }} - 1 à 2 tontes/sem{% else %}{{ noms[m] }} - 1 tonte/sem{% endif %}, hauteur conseillée {{ h }} cm
            {% endif %}

      - name: "Navimow - État"
        unique_id: navimow_etat_fr
        icon: >
          {% set s = states('lawn_mower.navimow_VOTRE_MODELE') %}
          {% if s == 'mowing' %}mdi:robot-mower{% elif s == 'docked' %}mdi:battery-charging{% elif s == 'paused' %}mdi:pause-circle{% elif s == 'returning' %}mdi:home-import-outline{% elif s == 'error' %}mdi:alert-circle{% else %}mdi:robot-mower-outline{% endif %}
        state: >
          {% set s = states('lawn_mower.navimow_VOTRE_MODELE') %}
          {% set session = is_state('input_boolean.tonte_session_active', 'on') %}
          {% set zone_iso = is_state('input_boolean.tonte_mode_zone_isolee', 'on') %}
          {% set trad = {'mowing':'En tonte','docked':'Sur la base','paused':'En pause','returning':'Retour base','error':'Erreur'} %}
          {% if s == 'mowing' and zone_iso %}En tonte ({{ states('input_text.tonte_zone_isolee_nom') | lower }})
          {% elif s == 'docked' and session %}En recharge (tonte en cours)
          {% else %}{{ trad.get(s, s) }}{% endif %}
        attributes:
          etat_brut: "{{ states('lawn_mower.navimow_VOTRE_MODELE') }}"
          batterie: "{{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}"
          session_active: "{{ is_state('input_boolean.tonte_session_active', 'on') }}"

      - name: "Tonte - Jours écoulés"
        unique_id: tonte_jours_ecoules
        icon: mdi:counter
        unit_of_measurement: "jours"
        state: >
          {% set d = states('input_datetime.tonte_derniere_date') %}
          {% if d in ['unknown','unavailable','None',''] %}99
          {% else %}{{ (now().date() - strptime(d, '%Y-%m-%d').date()).days }}{% endif %}

      - name: "Tonte - Jour planifié"
        unique_id: tonte_jour_planifie
        icon: mdi:calendar-question
        state: >
          {% set m = now().month %}
          {% set k = '{:02d}'.format(m) %}
          {% set iv = states('input_number.tonte_intervalle_' ~ k) | int(5) %}
          {% set fh = is_state('input_boolean.tonte_hivernage_force', 'on') %}
          {% if iv == 0 or fh %}non
          {% else %}
            {% set je = states('sensor.tonte_jours_ecoules') | int(99) %}
            {{ 'oui' if (je >= iv and je >= 2) else 'non' }}
          {% endif %}

      - name: "Tonte - Météo favorable"
        unique_id: tonte_meteo_favorable
        icon: "{% if is_state('sensor.tonte_meteo_favorable', 'oui') %}mdi:weather-sunny{% else %}mdi:weather-pouring{% endif %}"
        state: >
          {% set seuil = states('input_number.tonte_seuil_pluie') | float(50) %}
          {% set rc = states('sensor.breteuil_rain_chance') | float(-1) %}
          {% if rc >= 0 %}{{ 'non' if rc > seuil else 'oui' }}
          {% else %}
            {% set c = state_attr('weather.breteuil', 'condition') | default('unknown') %}
            {{ 'non' if c in ['rainy','pouring','lightning-rainy','snowy','snowy-rainy','hail','exceptional'] else 'oui' }}
          {% endif %}
        attributes:
          rain_chance: "{{ states('sensor.breteuil_rain_chance') | float(0) }}%"
          condition_meteo: "{{ state_attr('weather.breteuil', 'condition') | default('inconnu') }}"
          temperature: "{{ state_attr('weather.breteuil', 'temperature') | default('?') }}°C"
          meteo_demain: >
            {% set fc = state_attr('weather.breteuil', 'forecast') %}
            {% if fc and fc | length > 1 %}
              {% set c = fc[1].condition | default('unknown') %}
              {% if c in ['rainy','pouring','lightning-rainy','snowy','snowy-rainy','hail'] %}défavorable{% else %}favorable{% endif %}
            {% else %}inconnu{% endif %}

      - name: "Tonte - Décision du jour"
        unique_id: tonte_decision_jour
        icon: >
          {% set d = states('sensor.tonte_decision_du_jour') %}
          {% if d == 'tondre' %}mdi:robot-mower{% elif d == 'reporte_pluie' %}mdi:weather-pouring{% elif d == 'reporte_manuel' %}mdi:calendar-arrow-right{% elif d == 'hivernage' %}mdi:snowflake{% elif d == 'effectuee' %}mdi:check-circle{% elif d == 'en_cours' %}mdi:robot-mower{% else %}mdi:sleep{% endif %}
        state: >
          {% set m = now().month %}
          {% set k = '{:02d}'.format(m) %}
          {% set iv = states('input_number.tonte_intervalle_' ~ k) | int(5) %}
          {% set fh = is_state('input_boolean.tonte_hivernage_force', 'on') %}
          {% set je = states('sensor.tonte_jours_ecoules') | int(99) %}
          {% set sess = is_state('input_boolean.tonte_session_active', 'on') %}
          {% set mow = is_state('lawn_mower.navimow_VOTRE_MODELE', 'mowing') %}
          {% if iv == 0 or fh %}hivernage
          {% elif mow or sess %}en_cours
          {% elif je == 0 %}effectuee
          {% elif is_state('sensor.tonte_jour_planifie', 'non') %}pas_prevu
          {% elif is_state('input_boolean.tonte_reportee_aujourdhui', 'on') %}reporte_manuel
          {% elif is_state('sensor.tonte_meteo_favorable', 'non') %}reporte_pluie
          {% else %}tondre{% endif %}
        attributes:
          hauteur_recommandee: >
            {% set o = states('input_number.tonte_hauteur_override') | float(0) %}
            {% if o > 0 %}{{ o }}
            {% else %}
              {% set m = now().month %}
              {% set k = '{:02d}'.format(m) %}
              {{ states('input_number.tonte_hauteur_' ~ k) | float(4) }}
            {% endif %}
          prochaine_tonte_estimee: >
            {% set je = states('sensor.tonte_jours_ecoules') | int(0) %}
            {% set m = now().month %}
            {% set k = '{:02d}'.format(m) %}
            {% set iv = states('input_number.tonte_intervalle_' ~ k) | int(5) %}
            {% if je == 0 %}Dans {{ iv }} jour(s)
            {% else %}
              {% set r = iv - je %}
              {% if r < 2 - je %}{% set r = 2 - je %}{% endif %}
              {% if r <= 0 %}Aujourd'hui ou dès que possible
              {% else %}Dans {{ r }} jour(s){% endif %}
            {% endif %}
          tontes_saison: "{{ states('counter.tonte_compteur_saison') | int(0) }}"
          tontes_zone_isolee: "{{ states('counter.tonte_compteur_zone_isolee') | int(0) }}"


# ============================================================
#  3. SCRIPTS
# ============================================================

script:
  tonte_marquer_effectuee:
    alias: "🌿 Marquer jardin effectuée"
    icon: mdi:check-circle-outline
    sequence:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.tonte_derniere_date
        data:
          date: "{{ now().strftime('%Y-%m-%d') }}"
      - service: counter.increment
        target:
          entity_id: counter.tonte_compteur_saison
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.tonte_session_active
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.tonte_mode_zone_isolee
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.tonte_zone_confirmee
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.tonte_session_ignoree
      - service: timer.cancel
        target:
          entity_id: timer.tonte_fin_detection
      - service: persistent_notification.dismiss
        data:
          notification_id: "tonte_du_jour"
      - if:
          - condition: state
            entity_id: input_boolean.tonte_calendrier_actif
            state: "on"
        then:
          - service: calendar.create_event
            target:
              entity_id: calendar.tondeuse
            data:
              summary: "🌿 Tonte jardin #{{ states('counter.tonte_compteur_saison') }}"
              description: >
                Tonte jardin effectuée.
                Batterie restante : {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}%
                Hauteur conseillée : {{ state_attr('sensor.tonte_decision_du_jour', 'hauteur_recommandee') | float(4) }} cm
                Profil : {{ states('sensor.tonte_profil_saisonnier') | replace('_', ' ') | title }}
              start_date: "{{ now().strftime('%Y-%m-%d') }}"
              end_date: "{{ (now() + timedelta(days=1)).strftime('%Y-%m-%d') }}"

  tonte_marquer_zone_isolee:
    alias: "🌿 Marquer zone isolée effectuée"
    icon: mdi:floor-plan
    sequence:
      - service: counter.increment
        target:
          entity_id: counter.tonte_compteur_zone_isolee
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.tonte_session_active
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.tonte_mode_zone_isolee
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.tonte_zone_confirmee
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.tonte_session_ignoree
      - service: timer.cancel
        target:
          entity_id: timer.tonte_fin_detection
      - if:
          - condition: state
            entity_id: input_boolean.tonte_calendrier_actif
            state: "on"
        then:
          - service: calendar.create_event
            target:
              entity_id: calendar.tondeuse
            data:
              summary: "🏠 Tonte {{ states('input_text.tonte_zone_isolee_nom') }} #{{ states('counter.tonte_compteur_zone_isolee') }}"
              description: >
                Tonte zone isolée effectuée.
                Batterie restante : {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}%
              start_date: "{{ now().strftime('%Y-%m-%d') }}"
              end_date: "{{ (now() + timedelta(days=1)).strftime('%Y-%m-%d') }}"

  tonte_lancer:
    alias: "🌿 Lancer la tondeuse"
    icon: mdi:robot-mower
    sequence:
      - service: lawn_mower.start_mowing
        target:
          entity_id: lawn_mower.navimow_VOTRE_MODELE

  tonte_pause:
    alias: "🌿 Mettre en pause"
    icon: mdi:pause
    sequence:
      - service: lawn_mower.pause
        target:
          entity_id: lawn_mower.navimow_VOTRE_MODELE

  tonte_retour_base:
    alias: "🌿 Retour à la base"
    icon: mdi:home-import-outline
    sequence:
      - service: lawn_mower.dock
        target:
          entity_id: lawn_mower.navimow_VOTRE_MODELE


# ============================================================
#  4. AUTOMATIONS
# ============================================================

automation:

  - id: tonte_session_debut
    alias: "🌿 Début de session"
    trigger:
      - platform: state
        entity_id: lawn_mower.navimow_VOTRE_MODELE
        to: "mowing"
    condition:
      - condition: state
        entity_id: input_boolean.tonte_session_active
        state: "off"
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.tonte_session_active
      - service: timer.cancel
        target:
          entity_id: timer.tonte_fin_detection

  - id: tonte_demande_zone
    alias: "🌿 Demande zone après délai configurable"
    trigger:
      - platform: state
        entity_id: lawn_mower.navimow_VOTRE_MODELE
        to: "mowing"
    condition:
      - condition: state
        entity_id: input_boolean.tonte_zone_confirmee
        state: "off"
      - condition: state
        entity_id: input_boolean.tonte_mode_zone_isolee
        state: "off"
      - condition: template
        value_template: "{{ states('input_select.tonte_mode_notification') == 'telegram' }}"
      - condition: state
        entity_id: input_boolean.tonte_mode_vacances
        state: "off"
      # En mode auto, pas de demande de zone — c'est forcément le jardin
      - condition: state
        entity_id: input_boolean.tonte_mode_auto
        state: "off"
    action:
      - delay:
          seconds: "{{ states('input_number.tonte_delai_demande_zone') | int(120) }}"
      # Re-vérifier que la tonte est toujours en cours après le délai
      - condition: state
        entity_id: lawn_mower.navimow_VOTRE_MODELE
        state: "mowing"
      - condition: state
        entity_id: input_boolean.tonte_zone_confirmee
        state: "off"
      - choose:
          # Zone isolée activée → 3 boutons
          - conditions:
              - condition: state
                entity_id: input_boolean.tonte_zone_isolee_active
                state: "on"
            sequence:
              - service: telegram_bot.send_message
                data:
                  parse_mode: html
                  message: "🤖 <b>Tonte détectée !</b> Quelle zone ?"
                  inline_keyboard:
                    - - "🌿 Jardin:/tonte_zone_jardin"
                      - "🏠 {{ states('input_text.tonte_zone_isolee_nom') }}:/tonte_zone_isolee"
                      - "❌ Ignorer:/tonte_zone_ignorer"
        # Zone isolée désactivée → 2 boutons
        default:
          - service: telegram_bot.send_message
            data:
              parse_mode: html
              message: "🤖 <b>Tonte détectée !</b> Quelle zone ?"
              inline_keyboard:
                - - "🌿 Jardin:/tonte_zone_jardin"
                  - "❌ Ignorer:/tonte_zone_ignorer"

  - id: tonte_retour_base_timer
    alias: "🌿 Retour base, timer"
    description: >
      Démarre le timer de détection de fin de tonte au retour base.
      Actif uniquement si aucune prise connectée n'est configurée.
      Si prise configurée : c'est tonte_fin_detectee_prise qui gère.
    trigger:
      - platform: state
        entity_id: lawn_mower.navimow_VOTRE_MODELE
        to: "docked"
    condition:
      - condition: state
        entity_id: input_boolean.tonte_session_active
        state: "on"
      # Pas de timer si prise connectée configurée
      - condition: template
        value_template: "{{ states('input_text.tonte_cfg_prise_station') | trim == '' }}"
    action:
      - service: timer.start
        target:
          entity_id: timer.tonte_fin_detection
        data:
          duration: "{{ (states('input_number.tonte_delai_fin_detection') | int(60) * 60) }}"

  - id: tonte_reprise_apres_recharge
    alias: "🌿 Reprise après recharge"
    trigger:
      - platform: state
        entity_id: lawn_mower.navimow_VOTRE_MODELE
        to: "mowing"
    condition:
      - condition: state
        entity_id: input_boolean.tonte_session_active
        state: "on"
      - condition: state
        entity_id: timer.tonte_fin_detection
        state: "active"
    action:
      - service: timer.cancel
        target:
          entity_id: timer.tonte_fin_detection

  # tonte_batterie_pleine supprimée en v2.4.4 :
  # L'intégration NavimowHA remonte systématiquement 100% dans les 30s
  # après chaque dock (valeur fictive), rendant toute détection par
  # batterie impossible. Remplacé par timer 75 min.

  - id: tonte_fin_detectee
    alias: "🌿 Fin détectée"
    trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.tonte_fin_detection
    action:
      - choose:
          # Session ignorée — juste reset, pas de comptabilisation
          - conditions:
              - condition: state
                entity_id: input_boolean.tonte_session_ignoree
                state: "on"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.tonte_session_active
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.tonte_mode_zone_isolee
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.tonte_zone_confirmee
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.tonte_session_ignoree
              - service: timer.cancel
                target:
                  entity_id: timer.tonte_fin_detection
              - condition: state
                entity_id: input_boolean.tonte_mode_vacances
                state: "off"
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_select.tonte_mode_notification
                        state: "telegram"
                    sequence:
                      - service: telegram_bot.send_message
                        data:
                          parse_mode: html
                          message: "ℹ️ Tonte terminée (non comptabilisée)."
          # Zone isolée
          - conditions:
              - condition: state
                entity_id: input_boolean.tonte_mode_zone_isolee
                state: "on"
            sequence:
              - service: script.tonte_marquer_zone_isolee
              - condition: state
                entity_id: input_boolean.tonte_mode_vacances
                state: "off"
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_select.tonte_mode_notification
                        state: "telegram"
                    sequence:
                      - service: telegram_bot.send_message
                        data:
                          parse_mode: html
                          message: "✅ <b>Tonte {{ states('input_text.tonte_zone_isolee_nom') }} terminée !</b> 🔋 {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}% · {{ states('input_text.tonte_zone_isolee_nom') }} n°{{ states('counter.tonte_compteur_zone_isolee') }}"
                  - conditions:
                      - condition: state
                        entity_id: input_select.tonte_mode_notification
                        state: "mobile"
                    sequence:
                      - service: notify.mobile_app_pixel_9a
                        data:
                          title: "✅ {{ states('input_text.tonte_zone_isolee_nom') }} terminée !"
                          message: "Batterie : {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}%"
                          data:
                            tag: "tonte_du_jour"
                            channel: "Tonte"
        default:
          - service: script.tonte_marquer_effectuee
          - condition: state
            entity_id: input_boolean.tonte_mode_vacances
            state: "off"
          - choose:
              - conditions:
                  - condition: state
                    entity_id: input_select.tonte_mode_notification
                    state: "telegram"
                sequence:
                  - service: telegram_bot.send_message
                    data:
                      parse_mode: html
                      message: >-
                        ✅ <b>Tonte jardin terminée !</b>

                        🔋 {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}%
                        🔢 Tonte n°{{ states('counter.tonte_compteur_saison') }}
                        ➡️ Prochaine dans ~{{ state_attr('sensor.tonte_profil_saisonnier', 'intervalle_jours') | int(5) }} jours
              - conditions:
                  - condition: state
                    entity_id: input_select.tonte_mode_notification
                    state: "mobile"
                sequence:
                  - service: notify.mobile_app_pixel_9a
                    data:
                      title: "✅ Tonte terminée !"
                      message: "Batterie : {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}% · Tonte n°{{ states('counter.tonte_compteur_saison') }}"
                      data:
                        tag: "tonte_du_jour"
                        channel: "Tonte"

  - id: tonte_notification_matin
    alias: "🌿 Notification du matin"
    trigger:
      - platform: time
        at: input_datetime.tonte_heure_notification
    condition:
      - condition: state
        entity_id: input_boolean.tonte_mode_vacances
        state: "off"
      - condition: template
        value_template: "{{ states('input_select.tonte_mode_notification') != 'aucune' }}"
      - condition: template
        value_template: "{{ states('sensor.tonte_decision_du_jour') in ['tondre', 'reporte_pluie'] }}"
      # En mode auto, pas de notification de proposition le matin
      # (le démarrage auto se charge de tout)
      - condition: state
        entity_id: input_boolean.tonte_mode_auto
        state: "off"
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: sensor.tonte_decision_du_jour
                state: "tondre"
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "telegram"
            sequence:
              - service: telegram_bot.send_message
                data:
                  parse_mode: html
                  message: >-
                    🌿 <b>Jour de tonte !</b>

                    📏 Hauteur conseillée : {{ state_attr('sensor.tonte_decision_du_jour', 'hauteur_recommandee') | float(4) }} cm
                    🔋 Batterie : {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}%
                    📅 Dernière tonte il y a {{ states('sensor.tonte_jours_ecoules') }} jour(s)
                    🔢 Ce sera la tonte n°{{ states('counter.tonte_compteur_saison') | int(0) + 1 }}
                  inline_keyboard:
                    - "🚀 Lancer:/tonte_lancer, ⏭️ Reporter:/tonte_reporter_menu"
          - conditions:
              - condition: state
                entity_id: sensor.tonte_decision_du_jour
                state: "tondre"
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "mobile"
            sequence:
              - service: notify.mobile_app_pixel_9a
                data:
                  title: "🌿 Jour de tonte !"
                  message: "Hauteur conseillée : {{ state_attr('sensor.tonte_decision_du_jour', 'hauteur_recommandee') | float(4) }} cm · Batterie : {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}%"
                  data:
                    actions:
                      - action: "TONTE_LANCER"
                        title: "🚀 Lancer"
                      - action: "TONTE_REPORTEE_MANUELLEMENT"
                        title: "⏭️ Reporter"
                    tag: "tonte_du_jour"
                    importance: high
                    channel: "Tonte"
          - conditions:
              - condition: state
                entity_id: sensor.tonte_decision_du_jour
                state: "reporte_pluie"
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "telegram"
            sequence:
              - service: telegram_bot.send_message
                data:
                  parse_mode: html
                  message: >-
                    🌧️ <b>Tonte reportée — Pluie</b>

                    💧 Risque : {{ state_attr('sensor.tonte_meteo_favorable', 'rain_chance') }}
                    {% set dm = state_attr('sensor.tonte_meteo_favorable', 'meteo_demain') | default('inconnu') %}{% if dm == 'favorable' %}☀️ Demain favorable.{% elif dm == 'défavorable' %}🌧️ Pluie aussi demain.{% else %}🔄 Reproposé demain.{% endif %}
                  inline_keyboard:
                    - "🚀 Forcer:/tonte_lancer"
          - conditions:
              - condition: state
                entity_id: sensor.tonte_decision_du_jour
                state: "reporte_pluie"
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "mobile"
            sequence:
              - service: notify.mobile_app_pixel_9a
                data:
                  title: "🌧️ Tonte reportée"
                  message: "Risque pluie {{ state_attr('sensor.tonte_meteo_favorable', 'rain_chance') }}."
                  data:
                    tag: "tonte_du_jour"
                    channel: "Tonte"

  - id: tonte_report_delai_expire
    alias: "🌿 Report différé expiré"
    trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.tonte_report_delai
    condition:
      - condition: state
        entity_id: input_boolean.tonte_mode_vacances
        state: "off"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.tonte_reportee_aujourdhui
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "telegram"
            sequence:
              - service: telegram_bot.send_message
                data:
                  parse_mode: html
                  message: "🔔 <b>Rappel tonte !</b> 🔋 {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}%"
                  inline_keyboard:
                    - "🚀 Lancer:/tonte_lancer, ⏭️ Reporter:/tonte_reporter_menu"
          - conditions:
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "mobile"
            sequence:
              - service: notify.mobile_app_pixel_9a
                data:
                  title: "🔔 Rappel tonte !"
                  message: "Batterie : {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}%"
                  data:
                    actions:
                      - action: "TONTE_LANCER"
                        title: "🚀 Lancer"
                    tag: "tonte_du_jour"
                    importance: high
                    channel: "Tonte"

  # ═══ CALLBACKS TELEGRAM (action first + continue_on_error) ═══

  - id: tonte_telegram_lancer
    alias: "🌿 TG - Lancer"
    trigger:
      - platform: state
        entity_id: event.ha_maison_update_event
    condition:
      - condition: state
        entity_id: event.ha_maison_update_event
        attribute: event_type
        state: telegram_callback
      - condition: template
        value_template: "{{ trigger.to_state.attributes.data == '/tonte_lancer' }}"
    action:
      - service: lawn_mower.start_mowing
        target:
          entity_id: lawn_mower.navimow_VOTRE_MODELE
      - service: telegram_bot.answer_callback_query
        data:
          callback_query_id: "{{ trigger.to_state.attributes.id }}"
          message: "🚀 Lancé !"
        continue_on_error: true
      - service: telegram_bot.send_message
        data:
          parse_mode: html
          message: "🚀 <b>Tonte lancée !</b> 🔋 {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}%"

  - id: tonte_telegram_reporter_menu
    alias: "🌿 TG - Menu reporter"
    trigger:
      - platform: state
        entity_id: event.ha_maison_update_event
    condition:
      - condition: state
        entity_id: event.ha_maison_update_event
        attribute: event_type
        state: telegram_callback
      - condition: template
        value_template: "{{ trigger.to_state.attributes.data == '/tonte_reporter_menu' }}"
    action:
      - service: telegram_bot.answer_callback_query
        data:
          callback_query_id: "{{ trigger.to_state.attributes.id }}"
          message: "⏭️ Choisir le délai"
        continue_on_error: true
      - service: telegram_bot.send_message
        data:
          parse_mode: html
          message: "⏭️ <b>Reporter de combien ?</b>"
          inline_keyboard:
            - "1h:/tonte_delay_1h, 2h:/tonte_delay_2h"
            - "4h:/tonte_delay_4h, Demain:/tonte_delay_demain"

  - id: tonte_telegram_delay_1h
    alias: "🌿 TG - 1h"
    trigger:
      - platform: state
        entity_id: event.ha_maison_update_event
    condition:
      - condition: state
        entity_id: event.ha_maison_update_event
        attribute: event_type
        state: telegram_callback
      - condition: template
        value_template: "{{ trigger.to_state.attributes.data == '/tonte_delay_1h' }}"
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.tonte_reportee_aujourdhui
      - service: timer.start
        target:
          entity_id: timer.tonte_report_delai
        data:
          duration: "01:00:00"
      - service: telegram_bot.answer_callback_query
        data:
          callback_query_id: "{{ trigger.to_state.attributes.id }}"
          message: "⏰ 1h"
        continue_on_error: true
      - service: telegram_bot.send_message
        data:
          parse_mode: html
          message: "⏰ C'est noté ! Rappel dans 1 heure."

  - id: tonte_telegram_delay_2h
    alias: "🌿 TG - 2h"
    trigger:
      - platform: state
        entity_id: event.ha_maison_update_event
    condition:
      - condition: state
        entity_id: event.ha_maison_update_event
        attribute: event_type
        state: telegram_callback
      - condition: template
        value_template: "{{ trigger.to_state.attributes.data == '/tonte_delay_2h' }}"
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.tonte_reportee_aujourdhui
      - service: timer.start
        target:
          entity_id: timer.tonte_report_delai
        data:
          duration: "02:00:00"
      - service: telegram_bot.answer_callback_query
        data:
          callback_query_id: "{{ trigger.to_state.attributes.id }}"
          message: "⏰ 2h"
        continue_on_error: true
      - service: telegram_bot.send_message
        data:
          parse_mode: html
          message: "⏰ C'est noté ! Rappel dans 2 heures."

  - id: tonte_telegram_delay_4h
    alias: "🌿 TG - 4h"
    trigger:
      - platform: state
        entity_id: event.ha_maison_update_event
    condition:
      - condition: state
        entity_id: event.ha_maison_update_event
        attribute: event_type
        state: telegram_callback
      - condition: template
        value_template: "{{ trigger.to_state.attributes.data == '/tonte_delay_4h' }}"
    action:
      - service: input_boolean.turn_on
