          message: "✅ C'est noté ! Prochaine dans ~{{ state_attr('sensor.tonte_profil_saisonnier', 'intervalle_jours') | int(5) }} jours."

  - id: tonte_telegram_zone_jardin
    alias: "🌿 TG - Jardin"
    trigger:
      - platform: state
        entity_id: event.ha_maison_update_event
    condition:
      - condition: state
        entity_id: event.ha_maison_update_event
        attribute: event_type
        state: telegram_callback
      - condition: template
