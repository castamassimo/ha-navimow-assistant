          message: "⏭️ C'est noté ! Reproposé demain matin."

  - id: tonte_telegram_retour_base
    alias: "🌿 TG - Base"
    trigger:
      - platform: state
        entity_id: event.ha_maison_update_event
    condition:
      - condition: state
        entity_id: event.ha_maison_update_event
        attribute: event_type
