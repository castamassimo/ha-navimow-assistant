  # ═══ ALERTES ═══

  - id: tonte_alerte_erreur
    alias: "🌿 Alerte erreur"
    trigger:
      - platform: state
        entity_id: lawn_mower.navimow_VOTRE_MODELE
        to: "error"
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "telegram"
            sequence:
              - service: telegram_bot.send_message
                data:
                  parse_mode: html
                  message: "🚨 <b>Erreur Navimow !</b> 🔋 {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}%"
                  inline_keyboard:
                    - "🏠 Retour base:/tonte_retour_base"
          - conditions:
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "mobile"
            sequence:
              - service: notify.mobile_app_pixel_9a
                data:
                  title: "🚨 Erreur Navimow !"
                  message: "Batterie : {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}%"
                  data:
                    actions:
                      - action: "TONTE_RETOUR_BASE"
                        title: "🏠 Retour base"
                    tag: "tonte_erreur"
                    importance: high
                    channel: "Tonte"

  - id: tonte_alerte_batterie
    alias: "🌿 Alerte batterie"
    trigger:
      - platform: template
        value_template: "{{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(100) < states('input_number.tonte_seuil_batterie') | int(10) }}"
    condition:
      - condition: not
        conditions:
          - condition: state
            entity_id: lawn_mower.navimow_VOTRE_MODELE
            state: "docked"
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "telegram"
            sequence:
              - service: telegram_bot.send_message
                data:
                  parse_mode: html
                  message: "🔋 <b>Batterie faible !</b> {{ states('sensor.navimow_VOTRE_MODELE_batterie') }}%"
                  inline_keyboard:
                    - "🏠 Retour base:/tonte_retour_base"
          - conditions:
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "mobile"
            sequence:
              - service: notify.mobile_app_pixel_9a
                data:
                  title: "🔋 Batterie faible !"
                  message: "{{ states('sensor.navimow_VOTRE_MODELE_batterie') }}%"
                  data:
                    actions:
                      - action: "TONTE_RETOUR_BASE"
                        title: "🏠 Retour base"
                    tag: "tonte_batterie"
                    importance: high
                    channel: "Tonte"

  - id: tonte_rappel_retard
    alias: "🌿 Rappel retard"
    trigger:
      - platform: time
        at: "12:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.tonte_mode_vacances
        state: "off"
      - condition: template
        value_template: "{{ states('input_select.tonte_mode_notification') != 'aucune' }}"
      - condition: template
        value_template: >
          {% set j = states('sensor.tonte_jours_ecoules') | int(0) %}
          {% set i = state_attr('sensor.tonte_profil_saisonnier', 'intervalle_jours') | int(5) %}
          {% set mult = states('input_number.tonte_retard_multiplicateur') | float(2) %}
          {{ i > 0 and j >= (i * mult) | int }}
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "telegram"
            sequence:
              - service: telegram_bot.send_message
                data:
                  parse_mode: html
                  message: "⚠️ <b>Pelouse en retard !</b> Dernière il y a {{ states('sensor.tonte_jours_ecoules') }}j · 🔋 {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}%"
                  inline_keyboard:
                    - "🚀 Lancer:/tonte_lancer, ✅ Déjà fait:/tonte_effectuee"
          - conditions:
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "mobile"
            sequence:
              - service: notify.mobile_app_pixel_9a
                data:
                  title: "⚠️ Pelouse en retard !"
                  message: "Dernière il y a {{ states('sensor.tonte_jours_ecoules') }}j · Batterie : {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}%"
                  data:
                    actions:
                      - action: "TONTE_LANCER"
                        title: "🚀 Lancer"
                      - action: "TONTE_CONFIRMEE"
                        title: "✅ Déjà fait"
                    tag: "tonte_retard"
                    importance: high
                    channel: "Tonte"

  - id: tonte_changement_saison
    alias: "🌿 Changement saison"
    trigger:
      - platform: state
        entity_id: sensor.tonte_profil_saisonnier
    condition:
      - condition: template
        value_template: "{{ trigger.from_state.state != trigger.to_state.state and trigger.from_state.state not in ['unknown','unavailable'] }}"
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.from_state.state == 'hivernage' and trigger.to_state.state != 'hivernage' }}"
            sequence:
              - service: counter.reset
                target:
                  entity_id: counter.tonte_compteur_saison
              - service: counter.reset
                target:
                  entity_id: counter.tonte_compteur_zone_isolee
      - condition: state
        entity_id: input_boolean.tonte_mode_vacances
        state: "off"
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "telegram"
            sequence:
              - service: telegram_bot.send_message
                data:
                  parse_mode: html
                  message: "🗓️ <b>Nouveau profil :</b> {{ state_attr('sensor.tonte_profil_saisonnier', 'description_mois') }}"
          - conditions:
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "mobile"
            sequence:
              - service: notify.mobile_app_pixel_9a
                data:
                  title: "🗓️ Nouveau profil"
                  message: "{{ state_attr('sensor.tonte_profil_saisonnier', 'description_mois') }}"
                  data:
                    tag: "tonte_saison"
                    channel: "Tonte"

  - id: tonte_resume_hebdo
    alias: "🌿 Résumé hebdo"
    trigger:
      - platform: time
        at: "20:00:00"
    condition:
      - condition: time
        weekday:
          - sun
      - condition: template
        value_template: "{{ state_attr('sensor.tonte_profil_saisonnier', 'intervalle_jours') | int(0) > 0 }}"
      - condition: state
        entity_id: input_boolean.tonte_mode_vacances
        state: "off"
      - condition: template
        value_template: "{{ states('input_select.tonte_mode_notification') != 'aucune' }}"
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "telegram"
            sequence:
              - service: telegram_bot.send_message
                data:
                  parse_mode: html
                  message: >-
                    🌿 <b>Résumé de la semaine</b>

                    📊 {{ states('sensor.tonte_profil_saisonnier') | replace('_',' ') | title }}
                    🔢 Jardin : {{ states('counter.tonte_compteur_saison') }} · {{ states('input_text.tonte_zone_isolee_nom') }} : {{ states('counter.tonte_compteur_zone_isolee') }}
                    📅 Dernière : il y a {{ states('sensor.tonte_jours_ecoules') }}j
                    📏 Hauteur : {{ state_attr('sensor.tonte_decision_du_jour', 'hauteur_recommandee') | float(4) }} cm
                    🔋 {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}%
                    ➡️ Prochaine : {{ state_attr('sensor.tonte_decision_du_jour', 'prochaine_tonte_estimee') | default('—') }}
          - conditions:
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "mobile"
            sequence:
              - service: notify.mobile_app_pixel_9a
                data:
                  title: "🌿 Résumé de la semaine"
                  message: "Jardin : {{ states('counter.tonte_compteur_saison') }} · {{ states('input_text.tonte_zone_isolee_nom') }} : {{ states('counter.tonte_compteur_zone_isolee') }} · Prochaine : {{ state_attr('sensor.tonte_decision_du_jour', 'prochaine_tonte_estimee') | default('—') }}"
                  data:
                    tag: "tonte_recap"
                    channel: "Tonte"

  # ═══ RESET REPORT QUOTIDIEN À MINUIT ═══

  - id: tonte_reset_report_minuit
    alias: "🌿 Reset report à minuit"
    trigger:
      - platform: time
        at: "00:00:00"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.tonte_reportee_aujourdhui

  # ═══ SÉCURITÉ : RESET SESSION BLOQUÉE ═══

  - id: tonte_reset_session_bloquee
    alias: "🌿 Reset session bloquée"
    description: >
      Sécurité : si tonte_session_active est ON mais que la tondeuse
      est sur sa base depuis plus de 3h et que le timer est inactif,
      on reset automatiquement la session pour éviter un statut
      "en cours" bloqué indéfiniment.
    trigger:
      - platform: state
        entity_id: lawn_mower.navimow_VOTRE_MODELE
        to: "docked"
        for:
          hours: 3
    condition:
      - condition: state
        entity_id: input_boolean.tonte_session_active
        state: "on"
      - condition: not
        conditions:
          - condition: state
            entity_id: timer.tonte_fin_detection
            state: "active"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.tonte_session_active
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.tonte_mode_zone_isolee
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.tonte_zone_confirmee
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.tonte_session_ignoree
      - service: timer.cancel
        target:
          entity_id: timer.tonte_fin_detection

  # ═══ MODE FULL AUTONOME ═══

  - id: tonte_demarrage_auto
    alias: "🤖 Démarrage automatique"
    description: >
      En mode full autonome, démarre la tondeuse automatiquement
      si toutes les conditions sont réunies à l'heure de notification
      ou à l'heure de début de plage.
      Vérifie : jour de tonte, météo favorable, plage horaire,
      jour non exclu, pas en vacances.
    trigger:
      - platform: time
        at: input_datetime.tonte_heure_notification
      # Second trigger : si heure notif < heure début plage,
      # on retente au début de la plage autorisée
      - platform: time
        at: input_datetime.tonte_auto_heure_debut
    condition:
      # Mode auto activé
      - condition: state
        entity_id: input_boolean.tonte_mode_auto
        state: "on"
      # Pas en vacances
      - condition: state
        entity_id: input_boolean.tonte_mode_vacances
        state: "off"
      # Pas déjà en session
      - condition: state
        entity_id: input_boolean.tonte_session_active
        state: "off"
      # Jour de tonte prévu
      - condition: state
        entity_id: sensor.tonte_decision_du_jour
        state: "tondre"
      # Dans la plage horaire
      - condition: template
        value_template: >
          {% set now_t = now().strftime('%H:%M') %}
          {% set debut = states('input_datetime.tonte_auto_heure_debut')[0:5] %}
          {% set fin = states('input_datetime.tonte_auto_heure_fin')[0:5] %}
          {{ debut <= now_t <= fin }}
      # Jour non exclu
      - condition: template
        value_template: >
          {% set jours = {'lundi':0,'mardi':1,'mercredi':2,'jeudi':3,'vendredi':4,'samedi':5,'dimanche':6} %}
          {% set exclu = states('input_select.tonte_auto_jour_exclusion') %}
          {% if exclu == 'aucun' %}true
          {% else %}{{ now().weekday() != jours.get(exclu, -1) }}{% endif %}
    action:
      # Lancer la tondeuse
      - service: lawn_mower.start_mowing
        target:
          entity_id: lawn_mower.navimow_VOTRE_MODELE
      # Activer le watchdog
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.tonte_auto_watchdog_actif
      # Notification silencieuse de démarrage
      - condition: template
        value_template: "{{ states('input_select.tonte_mode_notification') != 'aucune' }}"
      - condition: state
        entity_id: input_boolean.tonte_mode_vacances
        state: "off"
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "telegram"
            sequence:
              - service: telegram_bot.send_message
                data:
                  parse_mode: html
                  message: >-
                    🤖 <b>Tonte démarrée automatiquement</b>

                    🔋 Batterie : {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}%
                    📏 Hauteur conseillée : {{ state_attr('sensor.tonte_decision_du_jour', 'hauteur_recommandee') | float(4) }} cm
                    🔢 Ce sera la tonte n°{{ states('counter.tonte_compteur_saison') | int(0) + 1 }}
                    ➡️ Aucune action requise.
                  inline_keyboard:
                    - - "⏹️ Arrêter:/tonte_retour_base"
          - conditions:
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "mobile"
            sequence:
              - service: notify.mobile_app_pixel_9a
                data:
                  title: "🤖 Tonte démarrée automatiquement"
                  message: "Batterie : {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}% · Tonte n°{{ states('counter.tonte_compteur_saison') | int(0) + 1 }}"
                  data:
                    actions:
                      - action: "TONTE_RETOUR_BASE"
                        title: "⏹️ Arrêter"
                    tag: "tonte_du_jour"
                    channel: "Tonte"

  - id: tonte_auto_watchdog_ok
    alias: "🤖 Watchdog démarrage auto - OK"
    description: >
      Désactive le watchdog quand la tondeuse passe bien en mowing
      après un démarrage automatique.
    trigger:
      - platform: state
        entity_id: lawn_mower.navimow_VOTRE_MODELE
        to: "mowing"
    condition:
      - condition: state
        entity_id: input_boolean.tonte_auto_watchdog_actif
        state: "on"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.tonte_auto_watchdog_actif

  - id: tonte_auto_watchdog_alerte
    alias: "🤖 Watchdog démarrage auto - Alerte"
    description: >
      Si la tondeuse n'est pas passée en mowing dans les 10 minutes
      après un démarrage automatique, envoie une alerte.
    trigger:
      - platform: state
        entity_id: input_boolean.tonte_auto_watchdog_actif
        to: "on"
        for:
          minutes: 10
    condition:
      - condition: state
        entity_id: input_boolean.tonte_auto_watchdog_actif
        state: "on"
      # Confirmer que la tondeuse n'est pas en mowing
      - condition: not
        conditions:
          - condition: state
            entity_id: lawn_mower.navimow_VOTRE_MODELE
            state: "mowing"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.tonte_auto_watchdog_actif
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "telegram"
            sequence:
              - service: telegram_bot.send_message
                data:
                  parse_mode: html
                  message: >-
                    ⚠️ <b>Démarrage auto échoué !</b>

                    La tondeuse n'a pas démarré après 10 minutes.
                    État actuel : {{ states('sensor.navimow_etat_fr') }}
                    🔋 {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}%

                    Vérifiez l'état de la tondeuse.
                  inline_keyboard:
                    - - "🚀 Réessayer:/tonte_lancer"
                      - "🏠 Base:/tonte_retour_base"
          - conditions:
              - condition: state
                entity_id: input_select.tonte_mode_notification
                state: "mobile"
            sequence:
              - service: notify.mobile_app_pixel_9a
                data:
                  title: "⚠️ Démarrage auto échoué !"
                  message: "La tondeuse n'a pas démarré. État : {{ states('sensor.navimow_etat_fr') }}"
                  data:
                    actions:
                      - action: "TONTE_LANCER"
                        title: "🚀 Réessayer"
                      - action: "TONTE_RETOUR_BASE"
                        title: "🏠 Base"
                    tag: "tonte_auto_echec"
                    importance: high
                    channel: "Tonte"

  # ═══ DÉTECTION FIN DE TONTE PAR PRISE CONNECTÉE ═══
  # Actif uniquement si input_text.tonte_cfg_prise_station est renseigné.
  # Détecte le passage en veille (6-10W) après une charge active (>50W)
  # confirmé pendant tonte_prise_delai_confirmation minutes.

  - id: tonte_fin_detectee_prise
    alias: "🔌 Fin détectée par prise connectée"
    description: >
      Détection de fin de tonte via la consommation de la station.
      Pattern terrain : veille ~8W, tonte absente ~3W, charge active ~74W.
      Fin confirmée quand puissance repasse en zone veille (6-10W)
      après une charge active, stable pendant X minutes.
    trigger:
      - platform: template
        value_template: >
          {% set prise = states('input_text.tonte_cfg_prise_station') | trim %}
          {% if prise == '' %}false
          {% else %}
            {% set w = states(prise) | float(-1) %}
            {% set vmin = states('input_number.tonte_prise_seuil_veille_min') | float(6) %}
            {% set vmax = states('input_number.tonte_prise_seuil_veille_max') | float(10) %}
            {{ w >= vmin and w <= vmax }}
          {% endif %}
        for:
          minutes: "{{ states('input_number.tonte_prise_delai_confirmation') | int(10) }}"
    condition:
      # Prise configurée
      - condition: template
        value_template: "{{ states('input_text.tonte_cfg_prise_station') | trim != '' }}"
      # Session active
      - condition: state
        entity_id: input_boolean.tonte_session_active
        state: "on"
      # Tondeuse dockée
      - condition: state
        entity_id: lawn_mower.navimow_VOTRE_MODELE
        state: "docked"
    action:
      # Annuler le timer de sécurité si actif
      - service: timer.cancel
        target:
          entity_id: timer.tonte_fin_detection
      # Déclencher la fin de session via événement
      - event: tonte_fin_confirmee_prise
        event_data:
          source: "prise_connectee"

  - id: tonte_fin_prise_handler
    alias: "🔌 Handler fin de tonte prise"
    description: >
      Reçoit l'événement de fin confirmée par prise et
      déclenche le même traitement que la fin par timer.
    trigger:
      - platform: event
        event_type: tonte_fin_confirmee_prise
    action:
      - choose:
          # Session ignorée
          - conditions:
              - condition: state
                entity_id: input_boolean.tonte_session_ignoree
                state: "on"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id:
                    - input_boolean.tonte_session_active
                    - input_boolean.tonte_mode_zone_isolee
                    - input_boolean.tonte_zone_confirmee
                    - input_boolean.tonte_session_ignoree
              - condition: state
                entity_id: input_boolean.tonte_mode_vacances
                state: "off"
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_select.tonte_mode_notification
                        state: "telegram"
                    sequence:
                      - service: telegram_bot.send_message
                        data:
                          parse_mode: html
                          message: "ℹ️ Tonte terminée (non comptabilisée)."
          # Zone isolée
          - conditions:
              - condition: state
                entity_id: input_boolean.tonte_mode_zone_isolee
                state: "on"
            sequence:
              - service: script.tonte_marquer_zone_isolee
              - condition: state
                entity_id: input_boolean.tonte_mode_vacances
                state: "off"
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_select.tonte_mode_notification
                        state: "telegram"
                    sequence:
                      - service: telegram_bot.send_message
                        data:
                          parse_mode: html
                          message: "✅ <b>Tonte {{ states('input_text.tonte_zone_isolee_nom') }} terminée !</b> 🔋 {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}% · {{ states('input_text.tonte_zone_isolee_nom') }} n°{{ states('counter.tonte_compteur_zone_isolee') }}"
                  - conditions:
                      - condition: state
                        entity_id: input_select.tonte_mode_notification
                        state: "mobile"
                    sequence:
                      - service: notify.mobile_app_pixel_9a
                        data:
                          title: "✅ {{ states('input_text.tonte_zone_isolee_nom') }} terminée !"
                          message: "Batterie : {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}%"
                          data:
                            tag: "tonte_du_jour"
                            channel: "Tonte"
        default:
          # Jardin
          - service: script.tonte_marquer_effectuee
          - condition: state
            entity_id: input_boolean.tonte_mode_vacances
            state: "off"
          - choose:
              - conditions:
                  - condition: state
                    entity_id: input_select.tonte_mode_notification
                    state: "telegram"
                sequence:
                  - service: telegram_bot.send_message
                    data:
                      parse_mode: html
                      message: >-
                        ✅ <b>Tonte jardin terminée !</b>

                        🔌 Détectée via prise connectée
                        🔋 {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}%
                        🔢 Tonte n°{{ states('counter.tonte_compteur_saison') }}
                        ➡️ Prochaine dans ~{{ state_attr('sensor.tonte_profil_saisonnier', 'intervalle_jours') | int(5) }} jours
              - conditions:
                  - condition: state
                    entity_id: input_select.tonte_mode_notification
                    state: "mobile"
                sequence:
                  - service: notify.mobile_app_pixel_9a
                    data:
                      title: "✅ Tonte terminée !"
                      message: "Batterie : {{ states('sensor.navimow_VOTRE_MODELE_batterie') | int(0) }}% · Tonte n°{{ states('counter.tonte_compteur_saison') }}"
                      data:
                        tag: "tonte_du_jour"
                        channel: "Tonte"
