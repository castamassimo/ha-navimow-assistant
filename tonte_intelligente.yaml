          message: "⏰ 4h"
        continue_on_error: true
      - service: telegram_bot.send_message
        data:
          parse_mode: html
          message: "⏰ C'est noté ! Rappel dans 4 heures."

  - id: tonte_telegram_delay_demain
    alias: "🌿 TG - Demain"
    trigger:
      - platform: state
        entity_id: event.ha_maison_update_event
    condition:
      - condition: state
        entity_id: event.ha_maison_update_event
        attribute: event_type
        state: telegram_callback
      - condition: template
