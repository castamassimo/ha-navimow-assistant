          message: "🏠 C'est noté ! Navimow retourne à sa base."

  - id: tonte_telegram_effectuee
    alias: "🌿 TG - Effectuée"
    trigger:
      - platform: state
        entity_id: event.ha_maison_update_event
    condition:
      - condition: state
        entity_id: event.ha_maison_update_event
        attribute: event_type
        state: telegram_callback
      - condition: template
        value_template: "{{ trigger.to_state.attributes.data == '/tonte_effectuee' }}"
    action:
      - service: script.tonte_marquer_effectuee
      - service: telegram_bot.answer_callback_query
        data:
